<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div</title>
</head>
<body>
    <h1>Divs no HTML</h1>
    <!-- Uma Div cria basicamente uma divisao para separar as partes do nosso HTML, exemplo: -->
    <div>
        <h1>Textos na div</h1>
        <p>Este texto está dentro da minha div, assim ficando em uma area separada</p>
    </div>
    <div>
        <h1>Div de imagens</h1>
        <img src="imagem.dog.jpg" alt="">
    </div>
</body>
</html>
