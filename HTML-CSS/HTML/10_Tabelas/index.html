<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabrlas</title>
    <style>
        td,th{
            text-align: center;
        }
        table{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>Tabelas</h1>
    <p>As tabelas não sao tão usadas recentemente porem ainda existem seus casos de uso como podemos ver na wikipedia</p>
    <h2>Estrutura da tabela</h2>
    <!-- A tag table define a tabela th para o cabeçalho -->
     <table>
        <tr>
            <th>ID</th>
            <th>NOME</th>
            <th>PROFISSÃO</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Wilson</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Alice</td>
            <td>Programad</td>
        </tr>
     </table>
</body>
</html>
