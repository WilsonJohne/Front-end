<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos</title>
</head>
<body>
    <!-- Os atributos sao os elementos que podemos colocar dentro da tag como o href -->
    <a href="https://www.google.com"  >google</a>

    <br>

    <!-- Abrir link em nova abba -->
    <!-- Target _blank nos leva a outra aba no navegador one abre o link -->
    <a href="https://www.google.com" target="_blank">google em nova aba</a>
</body>
</html>
